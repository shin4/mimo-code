[extend]
useDefault = true

[[allowlists]]
description = "Local generated and dependency artifacts that are not upload candidates"
paths = [
  '''^\.git-backups/''',
  '''^\.opencode/''',
  '''(^|/)node_modules/''',
  '''(^|/)\.turbo/''',
  '''(^|/)dist/''',
  '''^packages/desktop/out/''',
]

[[allowlists]]
description = "Intentional fake secret fixtures for HTTP recorder redaction tests"
condition = "AND"
targetRules = ["generic-api-key", "gcp-api-key"]
regexTarget = "line"
paths = ['''^packages/http-recorder/test/record-replay\.test\.ts$''']
regexes = [
  '''sk-123456789012345678901234''',
  '''AIzaSyDHibiBRvJZLsFnPYPoiTwxY4ztQ55yqCE''',
  '''api_key=secret-value''',
]

[[allowlists]]
description = "Keyboard shortcut labels that look like generic API keys"
condition = "AND"
targetRules = ["generic-api-key"]
regexTarget = "line"
paths = ['''^packages/app/src/pages/layout\.tsx$''']
regexes = ['''keybind:\s*"shift\+alt\+arrow(up|down)"''']
